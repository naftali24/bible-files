<!<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>1 Kings 1:1-5</title>
<style>
body{font-family:Arial;background:#f4ecd8;padding:20px}
h1{text-align:center;font-size:42px;color:#3b2412}

.group,.verse{
  background:white;
  border:3px solid #3b2412;
  border-radius:18px;
  padding:18px;
  margin:20px auto;
  max-width:1100px;
}

.groupImg{
  width:100%;
  border-radius:16px;
  border:3px solid #333;
  margin-bottom:15px;
}

.hebrew{
  font-size:44px;
  font-weight:bold;
  color:black;
  line-height:1.3;
}

.english{
  font-size:44px;
  font-weight:bold;
  color:#006400;
  direction:ltr;
  text-align:left;
  line-height:1.1;
}

.peirush{
  font-size:40px;
  color:green;
  background:#eef6ff;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

button{
  font-size:40px;
  margin:6px;
  padding:8px 14px;
}
</style>
</head>
<body>

<h1>מלכים א פרק א פסוקים א-ה<br>1 Kings 1:1-5</h1>

<div id="app"></div>

<script>
const groups = [
{
img:`<svg class="groupImg" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="420" fill="#f4d9a4"/>
<rect y="310" width="1200" height="110" fill="#b88952"/>
<text x="600" y="55" font-size="44" text-anchor="middle" fill="#3b2412">David grows old, Abishag serves him, Adonijah exalts himself</text>

<rect x="90" y="150" width="310" height="120" rx="20" fill="#8b5a2b" stroke="#3b2412" stroke-width="6"/>
<rect x="120" y="120" width="220" height="80" rx="22" fill="#fff4d6" stroke="#333" stroke-width="5"/>
<circle cx="185" cy="150" r="32" fill="#c6925b"/>
<path d="M160 147 Q185 118 210 147" fill="#ffffff"/>
<text x="245" y="238" font-size="32" text-anchor="middle" fill="#3b2412">King David old</text>

<circle cx="520" cy="170" r="36" fill="#c6925b"/>
<rect x="488" y="210" width="64" height="95" fill="#6a5acd"/>
<text x="520" y="342" font-size="32" text-anchor="middle" fill="#3b2412">Abishag</text>
<path d="M555 225 C620 220 640 180 675 170" stroke="#6a5acd" stroke-width="10" fill="none"/>

<rect x="760" y="120" width="250" height="190" fill="#d4af37" stroke="#333" stroke-width="6"/>
<circle cx="885" cy="180" r="38" fill="#c6925b"/>
<polygon points="850,135 885,95 920,135" fill="#ffd700" stroke="#333" stroke-width="4"/>
<rect x="848" y="220" width="74" height="90" fill="#8b0000"/>
<text x="885" y="355" font-size="34" text-anchor="middle" fill="#3b2412">Adonijah</text>

<circle cx="1040" cy="220" r="30" fill="#c6925b"/>
<rect x="1015" y="250" width="50" height="70" fill="#222"/>
<path d="M1010 305 L960 360" stroke="#333" stroke-width="8"/>
<path d="M1070 305 L1120 360" stroke="#333" stroke-width="8"/>
<text x="1040" y="385" font-size="28" text-anchor="middle">Chariots & riders</text>
</svg>`,
verses:[1,2,3,4,5]
}
];

const verses = {
1:{
h:"וְהַמֶּלֶךְ דָּוִד זָקֵן בָּא בַּיָּמִים וַיְכַסֻּהוּ בַּבְּגָדִים וְלֹא יִחַם לוֹ.",
e:"Now king David was old and stricken in years; and they covered him with clothes, but he gat no heat.",
p:"דוד המלך כבר היה זקן מאוד, וגם בגדים רבים לא חיממו אותו."
},
2:{
h:"וַיֹּאמְרוּ לוֹ עֲבָדָיו יְבַקְשׁוּ לַאדֹנִי הַמֶּלֶךְ נַעֲרָה בְתוּלָה וְעָמְדָה לִפְנֵי הַמֶּלֶךְ וּתְהִי לוֹ סֹכֶנֶת וְשָׁכְבָה בְחֵיקֶךָ וְחַם לַאדֹנִי הַמֶּלֶךְ.",
e:"Wherefore his servants said unto him, Let there be sought for my lord the king a young virgin: and let her stand before the king, and let her cherish him, and let her lie in thy bosom, that my lord the king may get heat.",
p:"עבדי דוד מציעים למצוא נערה שתטפל בו ותעזור לחמם אותו."
},
3:{
h:"וַיְבַקְשׁוּ נַעֲרָה יָפָה בְּכֹל גְּבוּל יִשְׂרָאֵל וַיִּמְצְאוּ אֶת אֲבִישַׁג הַשּׁוּנַמִּית וַיָּבִאוּ אֹתָהּ לַמֶּלֶךְ.",
e:"So they sought for a fair damsel throughout all the coasts of Israel, and found Abishag a Shunammite, and brought her to the king.",
p:"העבדים מחפשים בכל ישראל ומוצאים את אבישג השונמית."
},
4:{
h:"וְהַנַּעֲרָה יָפָה עַד מְאֹד וַתְּהִי לַמֶּלֶךְ סֹכֶנֶת וַתְּשָׁרְתֵהוּ וְהַמֶּלֶךְ לֹא יְדָעָהּ.",
e:"And the damsel was very fair, and cherished the king, and ministered to him: but the king knew her not.",
p:"אבישג משרתת את דוד ודואגת לו, אך אין ביניהם קשר של אישות."
},
5:{
h:"וַאֲדֹנִיָּה בֶן חַגִּית מִתְנַשֵּׂא לֵאמֹר אֲנִי אֶמְלֹךְ וַיַּעַשׂ לוֹ רֶכֶב וּפָרָשִׁים וַחֲמִשִּׁים אִישׁ רָצִים לְפָנָיו.",
e:"Then Adonijah the son of Haggith exalted himself, saying, I will be king: and he prepared him chariots and horsemen, and fifty men to run before him.",
p:"אדוניה בן חגית מתנשא ומנסה להציג את עצמו כיורש המלוכה."
}
};

function speakHebrew(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "he-IL";
  u.rate = 0.7;
  speechSynthesis.speak(u);
}

function speakEnglish(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.7;
  speechSynthesis.speak(u);
}

function renderVerses(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  groups.forEach(group=>{
    const g = document.createElement("div");
    g.className = "group";
    g.innerHTML = group.img;
    group.verses.forEach(num=>{
      const v = verses[num];
      const div = document.createElement("div");
      div.className = "verse";
      div.innerHTML = `
        <div class="hebrew" dir="rtl">${num}. ${v.h}</div>
        <div>
          <button onclick="speakHebrew(verses[${num}].h)">🔊 עברית</button>
          <button onclick="speakEnglish(verses[${num}].e)">🔊 English</button>
        </div>
        <div class="english">${num}. ${v.e}</div>
        <div class="peirush" dir="rtl">פירוש: ${v.p}</div>
      `;
      g.appendChild(div);
    });
    app.appendChild(g);
  });
}

renderVerses();
</script>

</body>
</html> html>
