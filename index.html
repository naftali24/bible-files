const verses = [["א", "וְהַמֶּלֶךְ שְׁלֹמֹה אָהַב נָשִׁים נָכְרִיּוֹת רַבּוֹת וְאֶת בַּת פַּרְעֹה מוֹאֲבִיּוֹת עַמֳּנִיּוֹת אֲדֹמִיֹּת צֵדְנִיֹּת חִתִּיֹּת.", "Now king Solomon loved many foreign women, together with the daughter of Pharaoh, women of the Moabites, Ammonites, Edomites, Zidonians, and Hittites.", "פירוש: שלמה נקשר לנשים מעמים רבים, וקשרים אלו פתחו פתח להשפעה רוחנית זרה בתוך בית המלוכה."], ["ב", "מִן הַגּוֹיִם אֲשֶׁר אָמַר יְהוָה אֶל בְּנֵי יִשְׂרָאֵל לֹא תָבֹאוּ בָהֶם וְהֵם לֹא יָבֹאוּ בָכֶם אָכֵן יַטּוּ אֶת לְבַבְכֶם אַחֲרֵי אֱלֹהֵיהֶם בָּהֶם דָּבַק שְׁלֹמֹה לְאַהֲבָה.", "Of the nations concerning which the LORD said unto the children of Israel: Ye shall not go among them, neither shall they come among you; for surely they will turn away your heart after their gods; Solomon did cleave unto these in love.", "פירוש: האזהרה אינה רק חברתית אלא פנימית: קִרבה עמוקה יכולה לשנות את הלב ואת נאמנותו."], ["ג", "וַיְהִי לוֹ נָשִׁים שָׂרוֹת שְׁבַע מֵאוֹת וּפִלַגְשִׁים שְׁלֹשׁ מֵאוֹת וַיַּטּוּ נָשָׁיו אֶת לִבּוֹ.", "And he had seven hundred wives, princesses, and three hundred concubines; and his wives turned away his heart.", "פירוש: המספר העצום מדגיש תהליך מתמשך של השפעה, עד שלבו של שלמה הוסט מדרכו."], ["ד", "וַיְהִי לְעֵת זִקְנַת שְׁלֹמֹה נָשָׁיו הִטּוּ אֶת לְבָבוֹ אַחֲרֵי אֱלֹהִים אֲחֵרִים וְלֹא הָיָה לְבָבוֹ שָׁלֵם עִם יְהוָה אֱלֹהָיו כִּלְבַב דָּוִיד אָבִיו.", "For it came to pass, when Solomon was old, that his wives turned away his heart after other gods; and his heart was not whole with the LORD his God, as was the heart of David his father.", "פירוש: בזקנתו התברר שההשפעה חדרה פנימה, ולבו כבר לא היה שלם כמו לב דוד."], ["ה", "וַיֵּלֶךְ שְׁלֹמֹה אַחֲרֵי עַשְׁתֹּרֶת אֱלֹהֵי צִדֹנִים וְאַחֲרֵי מִלְכֹּם שִׁקֻּץ עַמֹּנִים.", "For Solomon went after Ashtoreth the goddess of the Zidonians, and after Milcom the detestation of the Ammonites.", "פירוש: ההטיה הופכת למעשה גלוי: שלמה נמשך אחר פולחנים זרים של עמי הסביבה."], ["ו", "וַיַּעַשׂ שְׁלֹמֹה הָרַע בְּעֵינֵי יְהוָה וְלֹא מִלֵּא אַחֲרֵי יְהוָה כְּדָוִד אָבִיו.", "And Solomon did that which was evil in the sight of the LORD, and went not fully after the LORD, as did David his father.", "פירוש: גדולתו של שלמה אינה פוטרת אותו מן הדרישה ללכת אחרי ה׳ בשלמות הלב."], ["ז", "אָז יִבְנֶה שְׁלֹמֹה בָּמָה לִכְמוֹשׁ שִׁקֻּץ מוֹאָב בָּהָר אֲשֶׁר עַל פְּנֵי יְרוּשָׁלִָם וּלְמֹלֶךְ שִׁקֻּץ בְּנֵי עַמּוֹן.", "Then did Solomon build a high place for Chemosh the detestation of Moab, in the mount that is before Jerusalem, and for Molech the detestation of the children of Ammon.", "פירוש: החטא מקבל מקום בנוי וקבוע, ואף סמוך לירושלים, ולכן חומרתו גדולה."], ["ח", "וְכֵן עָשָׂה לְכָל נָשָׁיו הַנָּכְרִיּוֹת מַקְטִירוֹת וּמְזַבְּחוֹת לֵאלֹהֵיהֶן.", "And so did he for all his foreign wives, who offered and sacrificed unto their gods.", "פירוש: לא מדובר במקרה בודד; שלמה מאפשר מסגרת רחבה לפולחן הזר."], ["ט", "וַיִּתְאַנַּף יְהוָה בִּשְׁלֹמֹה כִּי נָטָה לְבָבוֹ מֵעִם יְהוָה אֱלֹהֵי יִשְׂרָאֵל הַנִּרְאָה אֵלָיו פַּעֲמָיִם.", "And the LORD was angry with Solomon, because his heart was turned away from the LORD, the God of Israel, who had appeared unto him twice.", "פירוש: שלמה זכה לגילוי מיוחד, ולכן האחריות עליו גדולה יותר."], ["י", "וְצִוָּה אֵלָיו עַל הַדָּבָר הַזֶּה לְבִלְתִּי לֶכֶת אַחֲרֵי אֱלֹהִים אֲחֵרִים וְלֹא שָׁמַר אֵת אֲשֶׁר צִוָּה יְהוָה.", "And had commanded him concerning this thing, that he should not go after other gods; but he kept not that which the LORD commanded.", "פירוש: החטא חמור מפני שנעשה בניגוד לציווי מפורש וברור."], ["יא", "וַיֹּאמֶר יְהוָה לִשְׁלֹמֹה יַעַן אֲשֶׁר הָיְתָה זֹּאת עִמָּךְ וְלֹא שָׁמַרְתָּ בְּרִיתִי וְחֻקֹּתַי אֲשֶׁר צִוִּיתִי עָלֶיךָ קָרֹעַ אֶקְרַע אֶת הַמַּמְלָכָה מֵעָלֶיךָ וּנְתַתִּיהָ לְעַבְדֶּךָ.", "Wherefore the LORD said unto Solomon: Forasmuch as this hath been in thy mind, and thou hast not kept My covenant and My statutes, which I have commanded thee, I will surely rend the kingdom from thee, and will give it to thy servant.", "פירוש: הפגיעה בברית מביאה לקריעת הממלכה; המלכות תלויה בנאמנות לה׳."], ["יב", "אַךְ בְּיָמֶיךָ לֹא אֶעֱשֶׂנָּה לְמַעַן דָּוִד אָבִיךָ מִיַּד בִּנְךָ אֶקְרָעֶנָּה.", "Notwithstanding in thy days I will not do it, for David thy father's sake; but I will rend it out of the hand of thy son.", "פירוש: בזכות דוד נדחית הפורענות, אך היא לא מתבטלת."], ["יג", "רַק אֶת כָּל הַמַּמְלָכָה לֹא אֶקְרָע שֵׁבֶט אֶחָד אֶתֵּן לִבְנֶךָ לְמַעַן דָּוִד עַבְדִּי וּלְמַעַן יְרוּשָׁלִַם אֲשֶׁר בָּחָרְתִּי.", "Howbeit I will not rend away all the kingdom; but I will give one tribe to thy son; for David My servant's sake, and for Jerusalem's sake which I have chosen.", "פירוש: גם בתוך הדין נשארת נאמנות לבית דוד ולבחירת ירושלים."], ["יד", "וַיָּקֶם יְהוָה שָׂטָן לִשְׁלֹמֹה אֵת הֲדַד הָאֲדֹמִי מִזֶּרַע הַמֶּלֶךְ הוּא בֶּאֱדוֹם.", "And the LORD raised up an adversary unto Solomon, Hadad the Edomite; he was of the king's seed in Edom.", "פירוש: שלוות הממלכה מתחילה להתערער מבחוץ, והדבר מוצג כחלק מהתגובה האלוקית."], ["טו", "וַיְהִי בִּהְיוֹת דָּוִד אֶת אֱדוֹם בַּעֲלוֹת יוֹאָב שַׂר הַצָּבָא לְקַבֵּר אֶת הַחֲלָלִים וַיַּךְ כָּל זָכָר בֶּאֱדוֹם.", "For it came to pass, when David was in Edom, and Joab the captain of the host was gone up to bury the slain, and had smitten every male in Edom.", "פירוש: הכתוב חוזר אל הרקע ההיסטורי שממנו צמחה איבתו של הדד."], ["טז", "כִּי שֵׁשֶׁת חֳדָשִׁים יָשַׁב שָׁם יוֹאָב וְכָל יִשְׂרָאֵל עַד הִכְרִית כָּל זָכָר בֶּאֱדוֹם.", "For Joab and all Israel remained there six months, until he had cut off every male in Edom.", "פירוש: המאבק באדום היה ממושך וקשה, והשאיר אחריו שורשי נקמה."], ["יז", "וַיִּבְרַח אֲדַד הוּא וַאֲנָשִׁים אֲדֹמִיִּים מֵעַבְדֵי אָבִיו אִתּוֹ לָבוֹא מִצְרָיִם וַהֲדַד נַעַר קָטָן.", "That Hadad fled, he and certain Edomites of his father's servants with him, to go into Egypt; Hadad being yet a little child.", "פירוש: הדד ניצל בילדותו, והבריחה למצרים הכינה את חזרתו העתידית."], ["יח", "וַיָּקֻמוּ מִמִּדְיָן וַיָּבֹאוּ פָּארָן וַיִּקְחוּ אֲנָשִׁים עִמָּם מִפָּארָן וַיָּבֹאוּ מִצְרַיִם אֶל פַּרְעֹה מֶלֶךְ מִצְרַיִם וַיִּתֶּן לוֹ בַיִת וְלֶחֶם אָמַר לוֹ וְאֶרֶץ נָתַן לוֹ.", "And they arose out of Midian, and came to Paran; and they took men with them out of Paran, and they came to Egypt, unto Pharaoh king of Egypt, who gave him a house, and appointed him victuals, and gave him land.", "פירוש: פרעה מעניק להדד מקלט ומעמד, ובכך נבנה לו בסיס חדש."], ["יט", "וַיִּמְצָא הֲדַד חֵן בְּעֵינֵי פַרְעֹה מְאֹד וַיִּתֶּן לוֹ אִשָּׁה אֶת אֲחוֹת אִשְׁתּוֹ אֲחוֹת תַּחְפְּנֵיס הַגְּבִירָה.", "And Hadad found great favour in the sight of Pharaoh, so that he gave him to wife the sister of his own wife, the sister of Tahpenes the queen.", "פירוש: הדד איננו פליט רגיל; הוא משתלב בבית המלוכה המצרי."], ["כ", "וַתֵּלֶד לוֹ אֲחוֹת תַּחְפְּנֵיס אֵת גְּנֻבַת בְּנוֹ וַתִּגְמְלֵהוּ תַחְפְּנֵס בְּתוֹךְ בֵּית פַּרְעֹה וַיְהִי גְנֻבַת בֵּית פַּרְעֹה בְּתוֹךְ בְּנֵי פַרְעֹה.", "And the sister of Tahpenes bore him Genubath his son, whom Tahpenes weaned in Pharaoh's house; and Genubath was in Pharaoh's house among the sons of Pharaoh.", "פירוש: הקשר בין הדד למצרים מתעמק גם דרך משפחתו ובנו."], ["כא", "וַהֲדַד שָׁמַע בְּמִצְרַיִם כִּי שָׁכַב דָּוִד עִם אֲבֹתָיו וְכִי מֵת יוֹאָב שַׂר הַצָּבָא וַיֹּאמֶר הֲדַד אֶל פַּרְעֹה שַׁלְּחֵנִי וְאֵלֵךְ אֶל אַרְצִי.", "And when Hadad heard in Egypt that David slept with his fathers, and that Joab the captain of the host was dead, Hadad said to Pharaoh: Let me depart, that I may go to mine own country.", "פירוש: מות דוד ויואב נראה להדד כשעת כושר לחזור ולפעול."], ["כב", "וַיֹּאמֶר לוֹ פַרְעֹה כִּי מָה אַתָּה חָסֵר עִמִּי וְהִנְּךָ מְבַקֵּשׁ לָלֶכֶת אֶל אַרְצֶךָ וַיֹּאמֶר לֹא כִּי שַׁלֵּחַ תְּשַׁלְּחֵנִי.", "Then Pharaoh said unto him: But what hast thou lacked with me, that, behold, thou seekest to go to thine own country? And he answered: Nothing; howbeit let me depart in any wise.", "פירוש: אף שטוב לו במצרים, הדד אינו מוותר על זהותו ועל ארצו."], ["כג", "וַיָּקֶם אֱלֹהִים לוֹ שָׂטָן אֶת רְזוֹן בֶּן אֶלְיָדָע אֲשֶׁר בָּרַח מֵאֵת הֲדַדְעֶזֶר מֶלֶךְ צוֹבָה אֲדֹנָיו.", "And God raised up another adversary unto him, Rezon the son of Eliada, who had fled from his lord Hadadezer king of Zobah.", "פירוש: אויב נוסף קם לשלמה, והלחץ על הממלכה גדל."], ["כד", "וַיִּקְבֹּץ עָלָיו אֲנָשִׁים וַיְהִי שַׂר גְּדוּד בַּהֲרֹג דָּוִד אֹתָם וַיֵּלְכוּ דַמֶּשֶׂק וַיֵּשְׁבוּ בָהּ וַיִּמְלְכוּ בְּדַמָּשֶׂק.", "And he gathered men unto him, and became captain over a troop, when David slew them; and they went to Damascus, and dwelt therein, and reigned in Damascus.", "פירוש: רזון יוצר כוח צבאי עצמאי ומבסס שלטון בדמשק."], ["כה", "וַיְהִי שָׂטָן לְיִשְׂרָאֵל כָּל יְמֵי שְׁלֹמֹה וְאֶת הָרָעָה אֲשֶׁר הֲדָד וַיָּקָץ בְּיִשְׂרָאֵל וַיִּמְלֹךְ עַל אֲרָם.", "And he was an adversary to Israel all the days of Solomon, beside the mischief that Hadad did; and he abhorred Israel, and reigned over Aram.", "פירוש: השלטון שהיה נראה יציב מוקף עתה באויבים מתמידים."], ["כו", "וְיָרָבְעָם בֶּן נְבָט אֶפְרָתִי מִן הַצְּרֵדָה וְשֵׁם אִמּוֹ צְרוּעָה אִשָּׁה אַלְמָנָה עֶבֶד לִשְׁלֹמֹה וַיָּרֶם יָד בַּמֶּלֶךְ.", "And Jeroboam the son of Nebat, an Ephraimite of Zeredah, a servant of Solomon, whose mother's name was Zeruah, a widow, he also lifted up his hand against the king.", "פירוש: אחרי האויבים מבחוץ מופיע איום מבפנים: ירבעם, מעבדיו של שלמה."], ["כז", "וְזֶה הַדָּבָר אֲשֶׁר הֵרִים יָד בַּמֶּלֶךְ שְׁלֹמֹה בָּנָה אֶת הַמִּלּוֹא סָגַר אֶת פֶּרֶץ עִיר דָּוִד אָבִיו.", "And this was the cause that he lifted up his hand against the king: Solomon built Millo, and repaired the breach of the city of David his father.", "פירוש: הכתוב קושר את עליית ירבעם למפעלי הבנייה והמסים של שלמה."], ["כח", "וְהָאִישׁ יָרָבְעָם גִּבּוֹר חָיִל וַיַּרְא שְׁלֹמֹה אֶת הַנַּעַר כִּי עֹשֵׂה מְלָאכָה הוּא וַיַּפְקֵד אֹתוֹ לְכָל סֵבֶל בֵּית יוֹסֵף.", "And the man Jeroboam was a mighty man of valour; and Solomon saw the young man that he was industrious, and he gave him charge over all the labour of the house of Joseph.", "פירוש: ירבעם מתואר כאדם מוכשר ופעיל, ולכן שלמה מעלה אותו לתפקיד משמעותי."], ["כט", "וַיְהִי בָּעֵת הַהִיא וְיָרָבְעָם יָצָא מִירוּשָׁלִָם וַיִּמְצָא אֹתוֹ אֲחִיָּה הַשִּׁילֹנִי הַנָּבִיא בַּדֶּרֶךְ וְהוּא מִתְכַּסֶּה בְּשַׂלְמָה חֲדָשָׁה וּשְׁנֵיהֶם לְבַדָּם בַּשָּׂדֶה.", "And it came to pass at that time, when Jeroboam went out of Jerusalem, that the prophet Ahijah the Shilonite found him in the way; now Ahijah had clad himself with a new garment; and they two were alone in the field.", "פירוש: המפגש עם הנביא מתרחש מחוץ לעיר ובסתר, כסימן לשינוי שעתיד לבוא."], ["ל", "וַיִּתְפֹּשׂ אֲחִיָּה בַּשַּׂלְמָה הַחֲדָשָׁה אֲשֶׁר עָלָיו וַיִּקְרָעֶהָ שְׁנֵים עָשָׂר קְרָעִים.", "And Ahijah laid hold of the new garment that was on him, and rent it in twelve pieces.", "פירוש: קריעת הבגד מסמלת את קריעת מלכות ישראל לשנים עשר חלקים."], ["לא", "וַיֹּאמֶר לְיָרָבְעָם קַח לְךָ עֲשָׂרָה קְרָעִים כִּי כֹה אָמַר יְהוָה אֱלֹהֵי יִשְׂרָאֵל הִנְנִי קֹרֵעַ אֶת הַמַּמְלָכָה מִיַּד שְׁלֹמֹה וְנָתַתִּי לְךָ אֵת עֲשָׂרָה הַשְּׁבָטִים.", "And he said to Jeroboam: Take thee ten pieces; for thus saith the LORD, the God of Israel: Behold, I will rend the kingdom out of the hand of Solomon, and will give ten tribes to thee.", "פירוש: ירבעם מקבל נבואה ברורה על מלוכה עתידית בעשרת השבטים."], ["לב", "וְהַשֵּׁבֶט הָאֶחָד יִהְיֶה לּוֹ לְמַעַן עַבְדִּי דָוִד וּלְמַעַן יְרוּשָׁלִַם הָעִיר אֲשֶׁר בָּחַרְתִּי בָהּ מִכֹּל שִׁבְטֵי יִשְׂרָאֵל.", "But he shall have one tribe, for My servant David's sake, and for Jerusalem's sake, the city which I have chosen out of all the tribes of Israel.", "פירוש: גם כאשר הממלכה נקרעת, נשאר נר לבית דוד ולירושלים."], ["לג", "יַעַן אֲשֶׁר עֲזָבוּנִי וַיִּשְׁתַּחֲווּ לְעַשְׁתֹּרֶת אֱלֹהֵי צִדֹנִין לִכְמוֹשׁ אֱלֹהֵי מוֹאָב וּלְמִלְכֹּם אֱלֹהֵי בְנֵי עַמּוֹן וְלֹא הָלְכוּ בִדְרָכַי לַעֲשׂוֹת הַיָּשָׁר בְּעֵינַי וְחֻקֹּתַי וּמִשְׁפָּטַי כְּדָוִד אָבִיו.", "Because that they have forsaken Me, and have worshipped Ashtoreth the goddess of the Zidonians, Chemosh the god of Moab, and Milcom the god of the children of Ammon; and they have not walked in My ways, to do that which is right in Mine eyes, and to keep My statutes and Mine ordinances, as did David his father.", "פירוש: הסיבה לקריעה מפורשת: עזיבת ה׳ ועבודה לאלוהי העמים."], ["לד", "וְלֹא אֶקַּח אֶת כָּל הַמַּמְלָכָה מִיָּדוֹ כִּי נָשִׂיא אֲשִׁתֶנּוּ כֹּל יְמֵי חַיָּיו לְמַעַן דָּוִד עַבְדִּי אֲשֶׁר בָּחַרְתִּי אֹתוֹ אֲשֶׁר שָׁמַר מִצְוֺתַי וְחֻקֹּתָי.", "Howbeit I will not take the whole kingdom out of his hand; but I will make him prince all the days of his life, for David My servant's sake, whom I chose, because he kept My commandments and My statutes.", "פירוש: שלמה עצמו יישאר במעמדו בימיו, מפני זכות דוד."], ["לה", "וְלָקַחְתִּי הַמְּלוּכָה מִיַּד בְּנוֹ וּנְתַתִּיהָ לְּךָ אֵת עֲשֶׂרֶת הַשְּׁבָטִים.", "But I will take the kingdom out of his son's hand, and will give it unto thee, even ten tribes.", "פירוש: הקריעה תופיע בפועל בדור הבא, בימי בנו של שלמה."], ["לו", "וְלִבְנוֹ אֶתֵּן שֵׁבֶט אֶחָד לְמַעַן הֱיוֹת נִיר לְדָוִיד עַבְדִּי כָּל הַיָּמִים לְפָנַי בִּירוּשָׁלִַם הָעִיר אֲשֶׁר בָּחַרְתִּי לִי לָשׂוּם שְׁמִי שָׁם.", "And unto his son will I give one tribe, that David My servant may have a lamp alway before Me in Jerusalem, the city which I have chosen Me to put My name there.", "פירוש: בית דוד ממשיך לשאת אור בירושלים, גם לאחר צמצום הממלכה."], ["לז", "וְאֹתְךָ אֶקַּח וּמָלַכְתָּ בְּכֹל אֲשֶׁר תְּאַוֶּה נַפְשֶׁךָ וְהָיִיתָ מֶּלֶךְ עַל יִשְׂרָאֵל.", "And I will take thee, and thou shalt reign over all that thy soul desireth, and shalt be king over Israel.", "פירוש: ירבעם מקבל הזדמנות גדולה למלוך, אך ההזדמנות תלויה בדרך שילך בה."], ["לח", "וְהָיָה אִם תִּשְׁמַע אֶת כָּל אֲשֶׁר אֲצַוֶּךָ וְהָלַכְתָּ בִדְרָכַי וְעָשִׂיתָ הַיָּשָׁר בְּעֵינַי לִשְׁמוֹר חֻקּוֹתַי וּמִצְוֺתַי כַּאֲשֶׁר עָשָׂה דָּוִד עַבְדִּי וְהָיִיתִי עִמָּךְ וּבָנִיתִי לְךָ בַיִת נֶאֱמָן כַּאֲשֶׁר בָּנִיתִי לְדָוִד וְנָתַתִּי לְךָ אֶת יִשְׂרָאֵל.", "And it shall be, if thou wilt hearken unto all that I command thee, and wilt walk in My ways, and do that which is right in Mine eyes, to keep My statutes and My commandments, as David My servant did, that I will be with thee, and will build thee a sure house, as I built for David, and will give Israel unto thee.", "פירוש: ההבטחה לירבעם מותנית בשמיעה בקול ה׳ ובשמירת דרך דוד."], ["לט", "וַאעַנֶּה אֶת זֶרַע דָּוִד לְמַעַן זֹאת אַךְ לֹא כָל הַיָּמִים.", "And I will for this afflict the seed of David, but not for ever.", "פירוש: בית דוד ייענש, אך העונש אינו ביטול נצחי של הברית."], ["מ", "וַיְבַקֵּשׁ שְׁלֹמֹה לְהָמִית אֶת יָרָבְעָם וַיָּקָם יָרָבְעָם וַיִּבְרַח מִצְרַיִם אֶל שִׁישַׁק מֶלֶךְ מִצְרַיִם וַיְהִי בְמִצְרַיִם עַד מוֹת שְׁלֹמֹה.", "Solomon sought therefore to kill Jeroboam; but Jeroboam arose, and fled into Egypt, unto Shishak king of Egypt, and was in Egypt until the death of Solomon.", "פירוש: הנבואה יוצרת מתח פוליטי, וירבעם נאלץ לברוח למצרים."], ["מא", "וְיֶתֶר דִּבְרֵי שְׁלֹמֹה וְכָל אֲשֶׁר עָשָׂה וְחָכְמָתוֹ הֲלוֹא הֵם כְּתֻבִים עַל סֵפֶר דִּבְרֵי שְׁלֹמֹה.", "Now the rest of the acts of Solomon, and all that he did, and his wisdom, are they not written in the book of the acts of Solomon?", "פירוש: הכתוב מסכם את גדולתו ומפנה לספרי המלוכה על מעשיו וחכמתו."], ["מב", "וְהַיָּמִים אֲשֶׁר מָלַךְ שְׁלֹמֹה בִירוּשָׁלִַם עַל כָּל יִשְׂרָאֵל אַרְבָּעִים שָׁנָה.", "And the time that Solomon reigned in Jerusalem over all Israel was forty years.", "פירוש: מלכות שלמה נמשכה ארבעים שנה, תקופה של גדולה אך גם של ניסיון רוחני."], ["מג", "וַיִּשְׁכַּב שְׁלֹמֹה עִם אֲבֹתָיו וַיִּקָּבֵר בְּעִיר דָּוִד אָבִיו וַיִּמְלֹךְ רְחַבְעָם בְּנוֹ תַּחְתָּיו.", "And Solomon slept with his fathers, and was buried in the city of David his father; and Rehoboam his son reigned in his stead.", "פירוש: עם מות שלמה מתחיל המעבר לדור הבא, שבו תתגלה בפועל קריעת הממלכה."]];

const audio = document.getElementById("audio");
const nowTime = document.getElementById("nowTime");

let stopAt = null;
let lastActiveIndex = -1;

audio.addEventListener("timeupdate", function(){
  const t = audio.currentTime;
  nowTime.textContent = t.toFixed(2);

  updateKaraoke(t);

  if(stopAt !== null && t >= stopAt){
    audio.pause();
    stopAt = null;
  }
});

function splitHebrewWords(text){
  return text.trim().split(/\s+/);
}

function renderHebrewKaraoke(index, activeWordCount){
  const container = document.getElementById("heb_" + index);
  if(!container) return;

  const verse = verses[index][1];
  const words = splitHebrewWords(verse);

  container.innerHTML = "";

  words.forEach((word, i)=>{
    const span = document.createElement("span");
    span.className = "karaokeWord" + (i < activeWordCount ? " gold" : "");
    span.textContent = word;
    container.appendChild(span);

    container.appendChild(document.createTextNode(" "));
  });
}

function resetHebrewKaraoke(index){
  renderHebrewKaraoke(index, 0);
}

function updateKaraoke(currentTime){
  let activeIndex = -1;
  let activeWordCount = 0;

  for(let i=0; i<timeTags.length; i++){
    const start = Number(timeTags[i].start) || 0;
    const end = Number(timeTags[i].end) || 9999;

    if(currentTime >= start && currentTime < end){
      activeIndex = i;

      const duration = Math.max(0.01, end - start);
      const progress = Math.min(1, Math.max(0, (currentTime - start) / duration));
      const words = splitHebrewWords(verses[i][1]);

      // מחלק את זמן הפסוק בין כל המילים לפי מהירות הדיבור הכללית
      activeWordCount = Math.ceil(progress * words.length);
      break;
    }
  }

  document.querySelectorAll(".verse").forEach((el,i)=>{
    if(i === activeIndex){
      el.classList.add("activeVerse");

      if(lastActiveIndex !== activeIndex){
        el.scrollIntoView({behavior:"smooth", block:"center"});
      }

      renderHebrewKaraoke(i, activeWordCount);
    } else {
      el.classList.remove("activeVerse");
      resetHebrewKaraoke(i);
    }
  });

  lastActiveIndex = activeIndex;
}

function speakHebrew(text){
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "he-IL";
  msg.rate = 0.7;
  speechSynthesis.speak(msg);
}

function speakEnglish(text){
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-US";
  msg.rate = 0.7;
  speechSynthesis.speak(msg);
}

function playNarrator(index){
  if(!audio.src){
    alert("אין קישור לאודיו בתוך הקוד");
    return;
  }

  const tag = timeTags[index];
  audio.currentTime = Number(tag.start) || 0;

  if(tag.end && Number(tag.end) < 9999){
    stopAt = Number(tag.end);
  } else {
    stopAt = null;
  }

  audio.play();
}

function readAll(){
  if(!audio.src){
    alert("אין קישור לאודיו בתוך הקוד");
    return;
  }

  audio.currentTime = Number(timeTags[0].start) || 0;
  stopAt = Number(timeTags[timeTags.length - 1].end) || null;
  audio.play();
}

function stopAudio(){
  audio.pause();
  stopAt = null;
}

function isRealLink(link){
  return link &&
         !link.includes("PASTE_IMAGE_LINK") &&
         (link.startsWith("http://") || link.startsWith("https://") || link.startsWith("data:image"));
}

function renderVerses(){
  const output = document.getElementById("output");
  output.innerHTML = "";

  for(let i=0; i<verses.length; i+=5){
    const group = document.createElement("div");
    group.className = "group";

    const groupIndex = Math.floor(i/5);
    const link = imageLinks[groupIndex] || "";

    if(isRealLink(link)){
      const img = document.createElement("img");
      img.className = "groupImg";
      img.src = link;
      group.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "placeholder";
      ph.textContent = "כאן הדבק קישור לתמונה עבור קבוצת הפסוקים הזאת";
      group.appendChild(ph);
    }

    verses.slice(i,i+5).forEach((v,localIndex)=>{
      const realIndex = i + localIndex;

      const box = document.createElement("div");
      box.className = "verse";
      box.id = "verse_" + realIndex;

 
 box.innerHTML = `
  <div class="hebrew" id="heb_${realIndex}">${v[1]}</div>
  <div class="english">${v[2]}</div>
  <div class="peirush">${v[3]}</div>
`;

      const bH = document.createElement("button");
      bH.textContent = "🔊 עברית";
      bH.onclick = () => speakHebrew(v[1]);

      const bE = document.createElement("button");
      bE.textContent = "🔊 English";
      bE.onclick = () => speakEnglish(v[2]);

      const bN = document.createElement("button");
      bN.textContent = "🎧 קריין";
      bN.onclick = () => playNarrator(realIndex);

      const bStop = document.createElement("button");
      bStop.textContent = "⏹ Stop";
      bStop.onclick = () => stopAudio();

      box.appendChild(bH);
      box.appendChild(bE);
      box.appendChild(bN);
      box.appendChild(bStop);

      group.appendChild(box);

      // מציג את הפסוק מיד גם לפני הפעלת הקריוקי
      renderHebrewKaraoke(realIndex, 0);
    });

    output.appendChild(group);
  }
}
