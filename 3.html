<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>1 Kings 11:1-3</title>
<style>
body{font-family:Arial;background:#f4ecd8;padding:20px}
h1{text-align:center;font-size:42px;color:#3b2412}

.group,.verse{
  background:white;
  border:3px solid #3b2412;
  border-radius:18px;
  padding:18px;
  margin:20px auto;
  max-width:1100px;
}

.groupImg{
  width:100%;
  border-radius:16px;
  border:3px solid #333;
  margin-bottom:15px;
}

.hebrew{
  font-size:44px;
  font-weight:bold;
  color:black;
  line-height:1.3;
}

.english{
  font-size:44px;
  font-weight:bold;
  color:#006400;
  direction:ltr;
  text-align:left;
  line-height:1.1;
}

.peirush{
  font-size:44px;
  color:green;
  background:#eef6ff;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

button{
  font-size:36px;
  margin:6px;
  padding:8px 14px;
}
</style>
</head>

<body>

<h1>מלכים א׳ פרק י״א פסוקים א׳–ג׳</h1>

<div id="content"></div>

<script>
const groups = [
  {
    image: `
    <svg class="groupImg" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="500" fill="#e8d3a2"/>
      <rect y="350" width="1200" height="150" fill="#c49a5a"/>
      <text x="600" y="70" font-size="46" text-anchor="middle" fill="#3b2412" font-weight="bold">
        Solomon, foreign wives, and the danger of turning the heart
      </text>
      <circle cx="590" cy="210" r="55" fill="#f2c879" stroke="#3b2412" stroke-width="5"/>
      <rect x="535" y="265" width="110" height="150" fill="#7b2f2f" stroke="#3b2412" stroke-width="5"/>
      <polygon points="520,170 660,170 620,120 560,120" fill="#d4af37" stroke="#3b2412" stroke-width="5"/>
      <circle cx="330" cy="250" r="45" fill="#f0c28a" stroke="#3b2412" stroke-width="4"/>
      <rect x="290" y="295" width="80" height="115" fill="#3b6ea5" stroke="#3b2412" stroke-width="4"/>
      <circle cx="830" cy="250" r="45" fill="#f0c28a" stroke="#3b2412" stroke-width="4"/>
      <rect x="790" y="295" width="80" height="115" fill="#4f8a3b" stroke="#3b2412" stroke-width="4"/>
      <path d="M260 420 C350 370, 450 370, 540 420" fill="none" stroke="#8b0000" stroke-width="8"/>
      <path d="M660 420 C760 370, 860 370, 960 420" fill="none" stroke="#8b0000" stroke-width="8"/>
      <text x="300" y="465" font-size="34" text-anchor="middle" fill="#3b2412">Moab</text>
      <text x="500" y="465" font-size="34" text-anchor="middle" fill="#3b2412">Ammon</text>
      <text x="700" y="465" font-size="34" text-anchor="middle" fill="#3b2412">Edom</text>
      <text x="900" y="465" font-size="34" text-anchor="middle" fill="#3b2412">Sidon</text>
      <path d="M590 285 C555 240, 510 240, 510 285 C510 330, 590 365, 590 365 C590 365, 670 330, 670 285 C670 240, 625 240, 590 285" fill="#b00020" opacity="0.85"/>
    </svg>
    `,
    verses: [
      {
        ref: "מלכים א׳ י״א:א׳",
        hebrew: "וְהַמֶּלֶךְ שְׁלֹמֹה אָהַב נָשִׁים נָכְרִיּוֹת רַבּוֹת וְאֶת־בַּת־פַּרְעֹה מוֹאֲבִיּוֹת עַמֳּנִיּוֹת אֲדֹמִיֹּת צֵדְנִיֹּת חִתִּיֹּת׃",
        english: "But king Solomon loved many strange women, together with the daughter of Pharaoh, women of the Moabites, Ammonites, Edomites, Zidonians, and Hittites;",
        peirush: "שלמה המלך, אף שהיה חכם גדול, נמשך אחרי קשרים רבים עם נשים מעמים זרים. הדבר לא היה רק עניין אישי, אלא סכנה רוחנית ומדינית: דרך הנישואין האלה נכנסו לארמון השפעות של עמים אחרים, עם אמונות ומנהגים הרחוקים מעבודת ה׳."
      },
      {
        ref: "מלכים א׳ י״א:ב׳",
        hebrew: "מִן־הַגּוֹיִם אֲשֶׁר אָמַר יְהוָה אֶל־בְּנֵי יִשְׂרָאֵל לֹא־תָבֹאוּ בָהֶם וְהֵם לֹא־יָבֹאוּ בָכֶם אָכֵן יַטּוּ אֶת־לְבַבְכֶם אַחֲרֵי אֱלֹהֵיהֶם בָּהֶם דָּבַק שְׁלֹמֹה לְאַהֲבָה׃",
        english: "Of the nations concerning which the LORD said unto the children of Israel, Ye shall not go in to them, neither shall they come in unto you: for surely they will turn away your heart after their gods: Solomon clave unto these in love.",
        peirush: "התורה הזהירה שלא להתערב בעמים האלה בדרך שתגרום לישראל להימשך אחרי עבודת האלילים שלהם. הפסוק מדגיש שהבעיה העיקרית היא נטיית הלב: כאשר האדם נקשר באהבה לדבר זר, גם שכל גדול וחכמה עצומה אינם מבטיחים שישמור על דרכו."
      },
      {
        ref: "מלכים א׳ י״א:ג׳",
        hebrew: "וַיְהִי־לוֹ נָשִׁים שָׂרוֹת שְׁבַע מֵאוֹת וּפִלַגְשִׁים שְׁלֹשׁ מֵאוֹת וַיַּטּוּ נָשָׁיו אֶת־לִבּוֹ׃",
        english: "And he had seven hundred wives, princesses, and three hundred concubines: and his wives turned away his heart.",
        peirush: "ריבוי הנשים מתואר כסימן להתרחבות גדולה מדי של חצר המלכות ושל קשרים זרים. בסופו של דבר, הנשים השפיעו על לבו של שלמה. הרעיון הוא שאפילו מלך חכם וחזק עלול להיחלש כאשר סביבתו מושכת אותו שוב ושוב לכיוון אחר."
      }
    ]
  }
];

function speakHebrew(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "he-IL";
  u.rate = 0.7;
  speechSynthesis.speak(u);
}

function speakEnglish(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.7;
  speechSynthesis.speak(u);
}

function renderVerses(){
  const content = document.getElementById("content");
  content.innerHTML = "";

  groups.forEach(group=>{
    const groupDiv = document.createElement("div");
    groupDiv.className = "group";
    groupDiv.innerHTML = group.image;

    group.verses.forEach(v=>{
      const verseDiv = document.createElement("div");
      verseDiv.className = "verse";

      verseDiv.innerHTML = `
        <h2 style="font-size:38px;color:#3b2412">${v.ref}</h2>
        <button onclick="speakHebrew(\`${v.hebrew.replace(/`/g,"")}\`)">🔊 עברית</button>
        <button onclick="speakEnglish(\`${v.english.replace(/`/g,"")}\`)">🔊 English</button>
        <div class="hebrew">${v.hebrew}</div>
        <div class="english">${v.english}</div>
        <div class="peirush">${v.peirush}</div>
      `;

      groupDiv.appendChild(verseDiv);
    });

    content.appendChild(groupDiv);
  });
}

renderVerses();
</script>

</body>
</html><!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Hello, World!</title>
</head>
<body>
  <h1>
    Hello, World!
  </h1>
</body>
</html>
